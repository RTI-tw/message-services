steps:
  # 單元測試（失敗則後續步驟不執行）
  - name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir -r requirements-dev.txt
        pytest -q

  # 建置 Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/message-services"
      - "."

  # 將 image 推到 Container Registry（或 Artifact Registry 也可改這裡）
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/message-services"

images:
  - "gcr.io/$PROJECT_ID/message-services"

options:
  logging: CLOUD_LOGGING_ONLY

